name: Release

# Only runs when a version tag (e.g. v1.0.0) is pushed; does not run on branch pushes.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binaries
        run: |
          export CGO_ENABLED=0
          VERSION=${GITHUB_REF#refs/tags/}
          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.version=${VERSION}" -o throcat-linux-amd64 ./cmd/throcat
          GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X main.version=${VERSION}" -o throcat-linux-arm64 ./cmd/throcat
          GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w -X main.version=${VERSION}" -o throcat-darwin-amd64 ./cmd/throcat
          GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w -X main.version=${VERSION}" -o throcat-darwin-arm64 ./cmd/throcat
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -X main.version=${VERSION}" -o throcat-windows-amd64.exe ./cmd/throcat
          GOOS=windows GOARCH=386 go build -ldflags "-s -w -X main.version=${VERSION}" -o throcat-windows-386.exe ./cmd/throcat
          mkdir -p dist
          mv throcat-* dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/throcat-linux-amd64
            dist/throcat-linux-arm64
            dist/throcat-darwin-amd64
            dist/throcat-darwin-arm64
            dist/throcat-windows-amd64.exe
            dist/throcat-windows-386.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
